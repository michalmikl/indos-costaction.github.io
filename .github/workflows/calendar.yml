name: Update calendar

on:
  schedule:
    - cron: 0 * * * * # Runs every hour at minute 0
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required to push changes back
    
    steps:
    # Step 1: Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch all history for proper commits
    
    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    # Step 3: Run the Python script
    - name: Update the calendar
      env:
        CALENDAR_URL: ${{ secrets.CALENDAR_URL || vars.CALENDAR_URL }}
      run: |
        python .github/scripts/calendar.py "$CALENDAR_URL" assets/calendar.ics

    # Step 4: Configure Git
    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
    
    # Step 5: Commit changes
    - name: Commit changes
      run: |
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated changes by GitHub Action"
    
    # Step 6: Push changes back
    - name: Push changes
      run: |
        git push origin HEAD:${GITHUB_REF#refs/heads/}
